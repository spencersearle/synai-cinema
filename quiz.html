<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synai — the taste quiz</title>
  <meta name="description" content="Ten this-or-that picks. Synai turns them into a ranked shortlist." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23F4C24B'/></svg>" />
  <link rel="preconnect" href="https://image.tmdb.org" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <div class="scene" aria-hidden="true">
    <div class="glow g1"></div>
    <div class="glow g2"></div>
  </div>

  <nav class="nav">
    <a class="brand" href="index.html"><span class="dot"></span>Synai</a>
    <a class="btn ghost" href="index.html">← Home</a>
  </nav>

  <main class="quiz-main">
    <div class="quiz-stage" id="quiz-stage">

      <div class="progress" aria-hidden="true">
        <span id="q-count">1 / 10</span>
        <span class="bar"><i id="prog-fill"></i></span>
      </div>

      <div class="q-card" id="q-card">
        <p class="eyebrow" id="q-kicker">Right now</p>
        <h2 id="q-prompt"></h2>
        <div id="q-body"></div>
      </div>

      <div class="q-foot" id="q-foot">
        <button class="ghost-btn" id="q-back" type="button">← Back</button>
        <span id="q-hint">Go with your gut · no wrong answers</span>
      </div>

      <section class="results" id="results" aria-live="polite">
        <div class="results-head">
          <p class="eyebrow" style="text-align:center">Your shortlist</p>
          <h2>Made <em>for you</em></h2>
          <p>Ranked for your mood tonight. Tap any poster to see what it's about.</p>
        </div>
        <div class="taste-summary" id="taste-summary"></div>
        <div class="rec-grid" id="rec-grid"></div>
        <div class="results-cta">
          <button class="btn" id="retake" type="button">Retake <span class="arr">↻</span></button>
          <a class="btn ghost" href="index.html">Home</a>
        </div>
      </section>

    </div>
  </main>

  <!-- movie detail modal -->
  <div class="modal" id="movie-modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="m-title">
      <button class="modal-close" type="button" data-close aria-label="Close">✕</button>
      <img class="modal-poster" id="m-poster" alt="" width="500" height="750" />
      <div class="modal-body">
        <p class="m-meta" id="m-meta"></p>
        <h3 id="m-title"></h3>
        <p class="m-facts" id="m-facts"></p>
        <div class="m-scores" id="m-scores"></div>
        <div class="m-moods" id="m-moods"></div>
        <p class="m-overview" id="m-overview"></p>
        <p class="m-cast" id="m-cast"></p>
        <p class="m-watch" id="m-watch"></p>
        <p class="m-match" id="m-match"></p>
      </div>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/curated.js"></script>
  <script src="assets/js/tmdb.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/quiz.js"></script>
</body>
</html>
